name: Build Gooood RSS

on:
  # 每天 UTC 16:00 (=北京时间 00:00) 跑一次,抓取最新 100 篇
  schedule:
    - cron: "0 16 * * *"
  # 允许你在 GitHub 网页上手动点 "Run workflow" 立即跑一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # 当前 build_rss.py 用的全是标准库, 无需额外依赖
          # 留这个 step 方便以后加 requests/beautifulsoup4 等

      - name: Build RSS
        run: |
          python build_rss.py

      - name: Show preview
        run: |
          head -20 gooood.xml
          echo "---"
          echo "Item count: $(grep -c '<item>' gooood.xml)"
          echo "File size : $(wc -c < gooood.xml) bytes"

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gooood.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh gooood RSS ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
